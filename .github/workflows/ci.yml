name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ubuntu-24.04
    env:
      ANDROID_VERSION: "android13"
      KERNEL_VERSION: "5.15"
      SUB_LEVEL: "167"
      OS_PATCH_LEVEL: "2024-11"
      KERNELSU_VARIANT: "KSU"
      KERNELSU_BRANCH: "Dev"
      INCLUDE_SUSFS: "true"
      BAZEL_LTO: ${{ matrix.lto }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: cook-cvd
            lto: none
          - target: cook-cvd-ksu
            lto: none
          - target: cook-cvd-aarch64
            lto: none
          - target: cook-cvd-ksu-aarch64
            lto: none
          - target: cook-gki
            lto: thin
          - target: cook-gki-ksu
            lto: thin
    steps:
      - uses: actions/checkout@v6

      - name: Install just
        run: |
          sudo apt-get update
          sudo apt-get install -y just
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL /usr/share/swift
          sudo docker image prune -a -f
          sudo apt-get clean
          df -h

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-${{ matrix.target }}-${{ hashFiles('justfile') }}
          restore-keys: |
            ${{ runner.os }}-ccache-${{ matrix.target }}-
            ${{ runner.os }}-ccache-

      - name: Cache bazel
        uses: actions/cache@v5
        with:
          path: ~/.cache/bazel
          key: ${{ runner.os }}-bazel-${{ matrix.target }}-${{ hashFiles('justfile') }}
          restore-keys: |
            ${{ runner.os }}-bazel-${{ matrix.target }}-
            ${{ runner.os }}-bazel-

      - name: Build
        env:
          REPO_NO_INTERACTIVE: "1"
        run: |
          just ${{ matrix.target }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-artifacts
          if-no-files-found: warn
          retention-days: 7
          path: |
            dist/**
            ${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}-${{ env.SUB_LEVEL }}/bazel-bin/common/kernel_aarch64/**
            ${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}-${{ env.SUB_LEVEL }}/bazel-bin/common-modules/virtual-device/**
