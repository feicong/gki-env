<?xml version="1.0" encoding="UTF-8"?>
<svg width="4000" height="3000" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="4000" height="3000" fill="#f8f9fa"/>

  <!-- 标题 -->
  <text x="2000" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#2c3e50">
    Kprobe + Kretprobe 执行顺序
  </text>
  
  <!-- 时间轴 -->
  <line x1="200" y1="300" x2="200" y2="2600" stroke="#34495e" stroke-width="8"/>
  <text x="100" y="1450" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#2c3e50" transform="rotate(-90, 100, 1450)">
    执行时间
  </text>

  <!-- 主执行流程区域 -->
  <rect x="400" y="350" width="3200" height="2000" fill="#ffffff" stroke="#34495e" stroke-width="4" rx="20"/>
  <text x="2000" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="#2c3e50">
    执行顺序
  </text>
  
  <!-- 执行步骤 -->

  <!-- 1. KRETPROBE ENTRY_HANDLER -->
  <rect x="600" y="550" width="2800" height="200" fill="#3498db" stroke="#2980b9" stroke-width="4" rx="15"/>
  <text x="2000" y="630" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white">
    ① KRETPROBE ENTRY_HANDLER
  </text>
  <text x="2000" y="690" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" fill="white">
    函数入口处调用，保存参数和状态
  </text>

  <!-- 箭头1 -->
  <path d="M 2000 770 L 2000 850" stroke="#e74c3c" stroke-width="8" fill="none" marker-end="url(#arrowhead)"/>

  <!-- 2. KPROBE PRE_HANDLER -->
  <rect x="600" y="870" width="2800" height="200" fill="#27ae60" stroke="#229954" stroke-width="4" rx="15"/>
  <text x="2000" y="950" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white">
    ② KPROBE PRE_HANDLER
  </text>
  <text x="2000" y="1010" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" fill="white">
    在被探测指令执行前调用
  </text>

  <!-- 箭头2 -->
  <path d="M 2000 1090 L 2000 1170" stroke="#e74c3c" stroke-width="8" fill="none" marker-end="url(#arrowhead)"/>

  <!-- 3. KPROBE POST_HANDLER -->
  <rect x="600" y="1190" width="2800" height="200" fill="#27ae60" stroke="#229954" stroke-width="4" rx="15"/>
  <text x="2000" y="1270" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white">
    ③ KPROBE POST_HANDLER
  </text>
  <text x="2000" y="1330" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" fill="white">
    在被探测指令执行后调用
  </text>

  <!-- 箭头3 -->
  <path d="M 2000 1410 L 2000 1490" stroke="#e74c3c" stroke-width="8" fill="none" marker-end="url(#arrowhead)"/>

  <!-- 4. KRETPROBE HANDLER -->
  <rect x="600" y="1510" width="2800" height="200" fill="#3498db" stroke="#2980b9" stroke-width="4" rx="15"/>
  <text x="2000" y="1590" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white">
    ④ KRETPROBE HANDLER
  </text>
  <text x="2000" y="1650" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" fill="white">
    函数返回时调用，恢复状态
  </text>

  <!-- 图例 -->
  <rect x="3200" y="2000" width="400" height="300" fill="white" stroke="#34495e" stroke-width="4" rx="15"/>
  <text x="3400" y="2050" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#2c3e50">
    图例
  </text>

  <rect x="3220" y="2080" width="60" height="30" fill="#3498db"/>
  <text x="3300" y="2105" font-family="Arial, sans-serif" font-size="24" fill="#2c3e50">KRETPROBE</text>

  <rect x="3220" y="2130" width="60" height="30" fill="#27ae60"/>
  <text x="3300" y="2155" font-family="Arial, sans-serif" font-size="24" fill="#2c3e50">KPROBE</text>

  <line x1="3220" y1="2180" x2="3280" y2="2180" stroke="#e74c3c" stroke-width="6"/>
  <text x="3300" y="2190" font-family="Arial, sans-serif" font-size="24" fill="#2c3e50">执行流</text>
  
  <!-- 箭头标记定义 -->
  <defs>
    <marker id="arrowhead" markerWidth="15" markerHeight="12" refX="14" refY="6" orient="auto">
      <polygon points="0 0, 15 6, 0 12" fill="#e74c3c"/>
    </marker>
  </defs>
</svg>
